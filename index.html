<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Management</title>
    <meta name="description" content="A simple, modern, responsive Kanban board built with vanilla HTML, CSS, and JS.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <h1>TaskFlow Kanban Board</h1>
        <div class="header-controls">
            <input type="text" id="searchInput" placeholder="Search tasks..." aria-label="Search tasks">
            <button id="themeToggle" class="btn btn-icon" aria-label="Toggle dark mode">🌙</button>
            <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
        </div>
    </header>

    <main class="board">
        <!-- Todo Column -->
        <section class="column" data-status="todo" id="col-todo">
            <div class="column-header">
                <h2>Todo <span class="task-count" id="count-todo">0</span></h2>
            </div>
            <div class="column-body dropzone" id="list-todo">
                <!-- Task Cards will be rendered here -->
            </div>
        </section>

        <!-- In Progress Column -->
        <section class="column" data-status="in-progress" id="col-in-progress">
            <div class="column-header">
                <h2>In Progress <span class="task-count" id="count-in-progress">0</span></h2>
            </div>
            <div class="column-body dropzone" id="list-in-progress">
                <!-- Task Cards will be rendered here -->
            </div>
        </section>

        <!-- Done Column -->
        <section class="column" data-status="done" id="col-done">
            <div class="column-header">
                <h2>Done <span class="task-count" id="count-done">0</span></h2>
            </div>
            <div class="column-body dropzone" id="list-done">
                <!-- Task Cards will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Add/Edit Task Modal -->
    <div id="taskModal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Task</h2>
                <button id="closeModalBtn" class="btn-close" aria-label="Close modal">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" required placeholder="E.g., Design homepage UI">
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description (Optional)</label>
                    <textarea id="taskDesc" rows="3" placeholder="Add more details..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date (Optional)</label>
                        <input type="date" id="taskDueDate">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal" aria-hidden="true">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2>Delete Task</h2>
                <button id="closeDeleteModalBtn" class="btn-close" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this task? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
